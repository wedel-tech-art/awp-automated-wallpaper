[general]
os_detected = xfce
session_type = x11
blanking_timeout = 1200
blanking_pause = false
workspaces = 4

[ws1]
folder = /home/USERNAME/awp/presets/TEMPLATE/ws1
icon = /home/USERNAME/awp/logos/ws1.png
icon_color = #00a3b3
color_variable = ws1_color
timing = 1h
mode = sequential
scaling = zoomed
icon_theme = Adwaita
gtk_theme = Adwaita-dark
cursor_theme = Adwaita
wm_theme = Adwaita
desktop_theme = Adwaita

